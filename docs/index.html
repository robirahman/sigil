<!DOCTYPE html>
<html class="height:100%" lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="static/css/global.css?v202305191" rel="stylesheet" />
	<link href="static/css/layout.css" rel="stylesheet" />
	<link href="static/css/styles.css" rel="stylesheet" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Arvo&family=Overlock&display=swap" rel="stylesheet" />
	<link href="https://use.typekit.net/rot4udi.css" rel="stylesheet" />
	<title>Sigil Online</title>
	<style>
		body > .main { padding-top: 80px; }
		.mode-menu {
			max-width: 400px;
			margin: 0 auto;
			text-align: center;
			padding: 20px;
		}
		.mode-menu h2 {
			font-family: 'Arvo', serif;
			color: #e0d0b0;
			margin-bottom: 24px;
			font-size: 1.3em;
		}
		.mode-button {
			display: block;
			width: 100%;
			padding: 16px 24px;
			margin: 12px 0;
			background: #2a2a4e;
			border: 2px solid #555;
			border-radius: 8px;
			color: #e0d0b0;
			font-family: 'Arvo', serif;
			font-size: 1.1em;
			cursor: pointer;
			transition: all 0.2s;
		}
		.mode-button:hover {
			background: #3a3a6e;
			border-color: #aaa;
		}
		.mode-button small {
			display: block;
			font-family: 'Overlock', sans-serif;
			font-size: 0.75em;
			color: #999;
			margin-top: 4px;
		}
		.mode-button--loading {
			opacity: 0.6;
			cursor: wait;
		}
	</style>
	<script>
		var webpDetector = new Image();
		webpDetector.onload = function () { document.documentElement.classList.add('webp'); };
		webpDetector.src = 'data:image/webp;base64,UklGRiQAAABXRUJQVlA4IBgAAAAwAQCdASoBAAEAAwA0JaQAA3AA/vuUAAA=';
	</script>
</head>
<body>
	<header>
		<div class="container">
			<div class="header-container">
				<div></div>
				<h1>
					<a href="./">
						<span class="visually-hidden">Sigil Online</span>
						<img class="max-width:100%" alt="" src="static/images/sigil-online-logo.svg" height="36" width="287" />
					</a>
				</h1>
				<div></div>
			</div>
		</div>
	</header>

	<div class="main">
		<div class="mode-menu">
			<h2>Choose a game mode</h2>
			<a class="mode-button" href="game.html">
				Local 1v1
				<small>Play on the same screen with a friend</small>
			</a>
			<a class="mode-button" href="game.html?ai=easy">
				vs AI (Easy)
				<small>Greedy heuristic opponent</small>
			</a>
			<a class="mode-button" id="medium-ai-btn" href="game.html?ai=medium">
				vs AI (Medium)
				<small>Neural network + MCTS (loads 8MB model)</small>
			</a>
			<a class="mode-button" href="multiplayer.html">
				Online Multiplayer
				<small>Play with a friend over the internet (<a href="firebase-setup.html" style="color: #8af; font-size: 0.9em;">setup guide</a>)</small>
			</a>
		</div>
	</div>
</body>
</html>

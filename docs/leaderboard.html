<!DOCTYPE html>
<html class="height:100%" lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="static/css/global.css?v202305191" rel="stylesheet" />
	<link href="static/css/layout.css" rel="stylesheet" />
	<link href="static/css/styles.css" rel="stylesheet" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Arvo&family=Overlock&display=swap" rel="stylesheet" />
	<link href="https://use.typekit.net/rot4udi.css" rel="stylesheet" />
	<title>Leaderboard - Sigil Online</title>
	<style>
		body > .main { padding-top: 80px; }
		.leaderboard {
			max-width: 500px;
			margin: 0 auto;
			padding: 24px;
			text-align: center;
		}
		.leaderboard h2 {
			font-family: 'Arvo', serif;
			color: #e0d0b0;
			margin-bottom: 20px;
		}
		.leaderboard-table {
			width: 100%;
			border-collapse: collapse;
			font-family: 'Overlock', sans-serif;
		}
		.leaderboard-table th {
			font-family: 'Arvo', serif;
			color: #888;
			font-size: 0.8em;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			padding: 8px 12px;
			border-bottom: 2px solid #333;
			text-align: left;
		}
		.leaderboard-table th:first-child { text-align: center; width: 40px; }
		.leaderboard-table th:nth-child(3),
		.leaderboard-table th:nth-child(4) { text-align: right; }
		.leaderboard-table td {
			padding: 10px 12px;
			border-bottom: 1px solid #222;
			color: #e0d0b0;
		}
		.leaderboard-table td:first-child {
			text-align: center;
			color: #888;
			font-family: 'Arvo', serif;
		}
		.leaderboard-table td:nth-child(3),
		.leaderboard-table td:nth-child(4) { text-align: right; }
		.leaderboard-table tr:nth-child(1) td:first-child { color: #ffd700; }
		.leaderboard-table tr:nth-child(2) td:first-child { color: #c0c0c0; }
		.leaderboard-table tr:nth-child(3) td:first-child { color: #cd7f32; }
		.leaderboard-table .name { font-weight: bold; }
		.leaderboard-table .name--ai { color: #a8c8ff; }
		.leaderboard-table .elo {
			font-family: 'Arvo', serif;
			color: #f0e0c0;
		}
		.loading-msg {
			color: #aaa;
			font-family: 'Overlock', sans-serif;
			padding: 40px 0;
		}
		.empty-msg {
			color: #777;
			font-family: 'Overlock', sans-serif;
			padding: 40px 0;
		}
		.back-link {
			display: inline-block;
			margin-top: 20px;
			color: #8af;
			font-family: 'Overlock', sans-serif;
			text-decoration: none;
		}
		.back-link:hover { text-decoration: underline; }
		.pagination {
			margin-top: 16px;
			display: flex;
			justify-content: center;
			gap: 8px;
		}
		.pagination__btn {
			padding: 6px 14px;
			border: 2px solid #555;
			border-radius: 6px;
			background: #1a1a2e;
			color: #e0d0b0;
			font-family: 'Overlock', sans-serif;
			font-size: 0.9em;
			cursor: pointer;
		}
		.pagination__btn:hover { border-color: #888; }
		.pagination__btn:disabled { opacity: 0.4; cursor: default; }
		.pagination__info {
			padding: 6px 0;
			color: #888;
			font-family: 'Overlock', sans-serif;
			font-size: 0.85em;
			align-self: center;
		}
	</style>
</head>
<body>
	<header>
		<div class="container">
			<div class="header-container">
				<div>
					<h1 class="logo"><a href="./"><span class="visually-hidden">Sigil Online</span><img alt="" src="static/images/logo-icon.svg" height="40" width="32" /></a></h1>
				</div>
				<h1></h1>
				<div></div>
			</div>
		</div>
	</header>

	<div class="main" x-data="leaderboardPage()">
		<div class="leaderboard">
			<h2>Leaderboard</h2>

			<p class="loading-msg" x-show="loading" x-cloak>Loading rankings...</p>
			<p class="empty-msg" x-show="!loading && allPlayers.length === 0" x-cloak>No ranked games played yet.</p>

			<table class="leaderboard-table" x-show="!loading && allPlayers.length > 0" x-cloak>
				<thead>
					<tr>
						<th>#</th>
						<th>Player</th>
						<th>Rating</th>
						<th>Games</th>
					</tr>
				</thead>
				<tbody>
					<template x-for="(player, index) in pagePlayers" x-bind:key="player.uid">
						<tr>
							<td x-text="pageStart + index + 1"></td>
							<td class="name" x-bind:class="{ 'name--ai': player.isAI }" x-text="player.displayName"></td>
							<td class="elo" x-text="player.elo"></td>
							<td x-text="player.gamesPlayed"></td>
						</tr>
					</template>
				</tbody>
			</table>

			<div class="pagination" x-show="totalPages > 1" x-cloak>
				<button class="pagination__btn" x-on:click="prevPage" x-bind:disabled="page === 0">&larr; Prev</button>
				<span class="pagination__info" x-text="(page + 1) + ' / ' + totalPages"></span>
				<button class="pagination__btn" x-on:click="nextPage" x-bind:disabled="page >= totalPages - 1">Next &rarr;</button>
			</div>

			<a class="back-link" href="./">&larr; Back to menu</a>
		</div>
	</div>

	<!-- Firebase SDK -->
	<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
	<script>
		firebase.initializeApp({
			apiKey: "AIzaSyDcYsA9GxotScZ6m92B_TDSArkeN1qMHvE",
			authDomain: "sigil-js.firebaseapp.com",
			databaseURL: "https://sigil-js-default-rtdb.firebaseio.com",
			projectId: "sigil-js",
			storageBucket: "sigil-js.firebasestorage.app",
			messagingSenderId: "174679859896",
			appId: "1:174679859896:web:9f8e5ddc4388ae73a60a4d"
		});
	</script>

	<script>
		document.addEventListener('alpine:init', () => {
			Alpine.data('leaderboardPage', () => ({
				allPlayers: [],
				loading: true,
				page: 0,
				perPage: 100,

				get totalPages() {
					return Math.max(1, Math.ceil(this.allPlayers.length / this.perPage));
				},

				get pageStart() {
					return this.page * this.perPage;
				},

				get pagePlayers() {
					return this.allPlayers.slice(this.pageStart, this.pageStart + this.perPage);
				},

				prevPage() { if (this.page > 0) this.page--; },
				nextPage() { if (this.page < this.totalPages - 1) this.page++; },

				async init() {
					const db = firebase.database();

					// Seed AI entries (best-effort, never blocks the read)
					try { await this._seedAIs(db); } catch (e) { console.warn('AI seeding skipped:', e.message); }

					// Fetch leaderboard
					try {
						const snap = await db.ref('leaderboard')
							.orderByChild('elo')
							.once('value');

						const results = [];
						snap.forEach((child) => {
							const data = child.val();
							results.push({
								uid: child.key,
								displayName: data.displayName || 'Unknown',
								elo: data.elo ?? 1000,
								gamesPlayed: data.gamesPlayed || 0,
								isAI: data.isAI || false,
							});
						});

						this.allPlayers = results.reverse();
					} catch (e) {
						console.error('Failed to load leaderboard:', e);
					}

					// If still empty, show AI defaults client-side
					if (this.allPlayers.length === 0) {
						this.allPlayers = [
							{ uid: '__ai_easy__', displayName: 'AI (Easy)', elo: 1000, gamesPlayed: 0, isAI: true },
							{ uid: '__ai_medium__', displayName: 'AI (Medium)', elo: 1000, gamesPlayed: 0, isAI: true },
						];
					}

					this.loading = false;
				},

				async _seedAIs(db) {
					// Authenticate if needed (writes require auth)
					if (!firebase.auth().currentUser) {
						await firebase.auth().signInAnonymously();
					}
					const ais = [
						{ uid: '__ai_easy__', name: 'AI (Easy)' },
						{ uid: '__ai_medium__', name: 'AI (Medium)' },
					];
					for (const ai of ais) {
						const snap = await db.ref('leaderboard/' + ai.uid).once('value');
						if (!snap.exists()) {
							await db.ref('leaderboard/' + ai.uid).set({
								displayName: ai.name,
								elo: 1000,
								gamesPlayed: 0,
								isAI: true,
							});
							await db.ref('users/' + ai.uid).set({
								displayName: ai.name,
								elo: 1000,
								gamesPlayed: 0,
								wins: 0,
								losses: 0,
								created: Date.now(),
								isAI: true,
							});
						}
					}
				},
			}));
		});
	</script>

	<script src="https://unpkg.com/alpinejs@3.10.4/dist/cdn.min.js"></script>
</body>
</html>

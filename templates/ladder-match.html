{% extends "layout.html" %}

{% block title %}Ladder Match - {% endblock %}

{% block head %}
{{ super() }}
<style>
	.ladder-match {
		display: flex;
		text-align: center;
		align-items: center;
		flex-direction: column;
		font-family: Papyrus, serif;
		font-size: 20px;
		color: white;
	}

	.ladder-match .prompt {
		font-weight: bold;
		padding: 10px;
		padding-bottom: 20px;
	}

	@media (max-width: 400px) {
		.ladder-match .prompt br {
			display: none;
		}
	}

	#ladder a[disabled=true] {
		filter: grayscale(85%);
		opacity: 0.4;
		min-width: 270px;
	}

	#ladder .hocus {
		display: none;
	}

	#ladder a[disabled=true]:focus .default,
	#ladder:hover a[disabled=true] .default {
		display: none;
	}

	#ladder a[disabled=true]:focus .hocus,
	#ladder:hover a[disabled=true] .hocus {
		display: inline;
	}

	.leaderboard {
		display: flex;
		justify-content: center;
		margin-top: 75px;

		border: 1px solid #ccc;
		border-radius: 10px;
		padding: 20px;
	}

	.leaderboard table {
		font-family: overlock, serif;
		min-width: 260px;
	}

	.leaderboard table td,
	.leaderboard table th {
		padding-bottom: 5px;
	}

	.leaderboard table td:first-child,
	.leaderboard table th:first-child {
		text-align: left;
	}

	.leaderboard table td:last-child,
	.leaderboard table th:last-child {
		text-align: right;
	}

	.leaderboard table th {
		border-bottom: 1px solid #ccc;
	}

	.leaderboard table tr:first-child td {
		padding-top: 10px;
	}
</style>
{% endblock %}

{% block content %}
{{ super() }}
<div class="ladder-match">
	<div class="prompt">
		Join the queue to play a ranked game<br />
		against a random opponent.
	</div>
	<div id="ladder">
		<a
			class="menu-button join"
			href="{{ url_for('laddergame') }}"
		>
			<span class="default">Join Ladder Match Queue</span>
			<span class="hocus">Thursdays 6pm - 12pm ET</span>
		</a>
	</div>
	<div class="leaderboard">
		<table>
			<tr>
				<th>Name</th>
				<th>Rating</th>
			</tr>
		</table>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.40/moment-timezone-with-data-10-year-range.min.js"></script>
	<script>
		//disable Join Ladder Match Queue button unless within time window
		const nowEastern = moment().tz('America/New_York');
		const isThursdayEastern = nowEastern.format('dddd') === 'Thursday';
		const startEastern = moment(nowEastern).hour(12+6).minute(0).second(0);
		const endEastern = moment(startEastern).add(6, 'h');
		const enableLadder = isThursdayEastern && nowEastern.isBetween(startEastern, endEastern);
		if (!enableLadder) {
			const ladderBtn = document.querySelector('#ladder .join');
			ladderBtn.setAttribute('disabled', 'true');
		}

		//populate leaderboard
		fetch('/api/leaderboard')
			.then(res => res.json())
			.then(leaderboard => {
				const tableElem = document.querySelector('table');
				let html = tableElem.innerHTML;
				for (let leaderRow of leaderboard) {
					html += '<tr>';
					html += 	`<td>${leaderRow.name}</td>`;
					html += 	`<td>${leaderRow.elo}</td>`;
					html += '</tr>';
				}
				tableElem.innerHTML = html;
			});
	</script>
</div>
{% endblock %}

{% extends "layout-form.html" %}

{% block title %}Signup - {% endblock %}

{% block content %}
{{ super() }}
<div class="column is-4 is-offset-4">
	<div>
		{% with messages = get_flashed_messages() %} {% if messages %}
		<div class="notification is-danger">{{ messages[0] }}.</div>
		{% endif %} {% endwith %}
		<form
			method="POST"
			action="/signup"
		>
			<div class="field">
				<div class="control">
					<input
						class="input is-large"
						type="email"
						name="email"
						placeholder="Email"
						autofocus=""
						value="{{ email }}"
						required
					/>
				</div>
			</div>

			<div class="field">
				<div class="control">
					<input
						class="input is-large"
						type="text"
						name="name"
						placeholder="User Name"
						value="{{ name }}"
						required
					/>
				</div>
			</div>

			<div class="field">
				<div class="control">
					<input
						class="input is-large"
						type="password"
						name="password"
						placeholder="Password"
						value="{{ password }}"
						required
					/>
				</div>
			</div>

			<button class="button button-prime is-block is-large is-fullwidth">Sign Up</button>

			<div class="cross-link">
				Already have an account?&nbsp;<a href="/login">Login</a>
			</div>
		</form>
	</div>
</div>
{% endblock %}

<!DOCTYPE html>
<html
	class="height:100%"
	lang="en"
>
	<head>
		{% block head %}
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<meta
			http-equiv="X-UA-Compatible"
			content="ie=edge"
		/>
		<link
			href="/static/css/global.css"
			rel="stylesheet"
		/>
		<link
			href="/static/css/styles.css"
			rel="stylesheet"
		/>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Arvo&family=Overlock&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://use.typekit.net/rot4udi.css"
			rel="stylesheet"
		/>
		<title>{% block title %}{% endblock %}Sigil Online</title>
		{% endblock %}

		<style>
			.header-container {
				display: flex;
			}

			.header-container > * {
				display: flex;
				flex-basis: 100%;
				color: white;
			}

			.header-container .login-status-container {
				justify-content: flex-end;
			}
		</style>
	</head>

	<body>
		<header
			class="masthead"
			style="pointer-events: auto; position: static"
		>
			<div class="container">
				<div class="header-container">
					<div></div>
					<h1 class="text-align:center">
						<a href="/">
							<span class="visually-hidden">Sigil Online</span>
							<img
								class="max-width:100%"
								alt=""
								src="/static/images/sigil-online-logo.svg"
								height="36"
								width="287"
							/>
						</a>
					</h1>
					<div class="login-status-container" x-data="{ name: '{{current_user_name}}' }">
						<div class="log-status-out" x-show="name === ''" x-cloak>
							<a href="/login">Login</a> / <a href="/signup">Sign Up</a>
						</div>
						<div class="log-status-in" x-show="name !== ''" x-cloak>
							<span x-text="name"></span> <a href="/logout">Logout</a>
						</div>
					</div>
				</div>
			</div>
		</header>
		<div style="height: 5vh"></div>

		{% block content %} {% endblock %}

		<script src="https://unpkg.com/alpinejs@3.10.4/dist/cdn.min.js"></script>
	</body>
</html>

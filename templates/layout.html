<!DOCTYPE html>
<html
	class="height:100%"
	lang="en"
>
	<head>
		{% block head %}
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<meta
			http-equiv="X-UA-Compatible"
			content="ie=edge"
		/>
		<link
			href="/static/css/styles.css"
			rel="stylesheet"
		/>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Arvo&family=Overlock&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://use.typekit.net/rot4udi.css"
			rel="stylesheet"
		/>
		<title>{% block title %}{% endblock %} - Sigil Online</title>
		{% endblock %}
	</head>

	<body>
		<header
			class="masthead"
			style="pointer-events: auto; position: static"
		>
			<div class="container">
				<div class="container__inner">
					<h1 class="text-align:center">
						<a href="/">
							<span class="visually-hidden">Sigil Online</span>
							<img
								class="max-width:100%"
								alt=""
								src="/static/images/sigil-online-logo.svg"
								height="36"
								width="287"
							/>
						</a>
					</h1>
				</div>
			</div>
		</header>

		{% block content %} {% endblock %}
	</body>
</html>

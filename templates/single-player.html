<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<meta
			http-equiv="X-UA-Compatible"
			content="ie=edge"
		/>
		<title>Single Player - Sigil Online</title>
		<link
			href="/static/css/styles.css"
			rel="stylesheet"
		/>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Arvo&family=Overlock&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://use.typekit.net/rot4udi.css"
			rel="stylesheet"
		/>
		<script
			defer
			src="https://unpkg.com/alpinejs@3.10.2/dist/cdn.min.js"
		></script>
		<script>
			var webpDetector = new Image();
			webpDetector.onload = function () {
				document.documentElement.classList.add('webp');
			};
			webpDetector.src =
				'data:image/webp;base64,UklGRiQAAABXRUJQVlA4IBgAAAAwAQCdASoBAAEAAwA0JaQAA3AA/vuUAAA=';
		</script>
		<script src="/static/scripts/game-board.js"></script>
	</head>
	<body>
		<div x-data="gameBoard({ playerCount: 1 })">
			<header class="masthead">
				<div class="container">
					<div class="container__inner">
						<h1 class="logo">
							<a href="/"
								><span class="visually-hidden">Sigil Online</span
								><img
									alt=""
									src="/static/images/v2/logo-icon.svg"
									height="40"
									width="32"
							/></a>
						</h1>
					</div>
				</div>
			</header>
			<div class="container">
				<div class="container__inner">
					<template x-if="messageHistory.length > 0">
						<ul
							class="feed feed--history"
							x-ref="messageHistory"
						>
							<template x-for="message in messageHistory">
								<li x-text="message"></li>
							</template>
						</ul>
					</template>

					<div class="dice">
						<div
							class="die die--red"
							x-bind:data-die-face="redSpellCounter"
							x-bind:title="`${redSpellCounter} spells cast`"
						>
							<div class="die__face die__face--1">
								<div class="die__pip die__pip--mm"></div>
							</div>
							<div class="die__face die__face--2">
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--tl"></div>
							</div>
							<div class="die__face die__face--3">
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--mm"></div>
								<div class="die__pip die__pip--tl"></div>
							</div>
							<div class="die__face die__face--4">
								<div class="die__pip die__pip--bl"></div>
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--tl"></div>
								<div class="die__pip die__pip--tr"></div>
							</div>
							<div class="die__face die__face--5">
								<div class="die__pip die__pip--bl"></div>
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--mm"></div>
								<div class="die__pip die__pip--tl"></div>
								<div class="die__pip die__pip--tr"></div>
							</div>
							<div class="die__face die__face--6">
								<div class="die__pip die__pip--bl"></div>
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--ml"></div>
								<div class="die__pip die__pip--mr"></div>
								<div class="die__pip die__pip--tl"></div>
								<div class="die__pip die__pip--tr"></div>
							</div>
							<div class="die__face die__face--0">
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--mm"></div>
								<div class="die__pip die__pip--tl"></div>
							</div>
						</div>

						<div
							class="die die--blue"
							x-bind:data-die-face="blueSpellCounter"
							x-bind:title="`${blueSpellCounter} spells cast`"
						>
							<div class="die__face die__face--1">
								<div class="die__pip die__pip--mm"></div>
							</div>
							<div class="die__face die__face--2">
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--tl"></div>
							</div>
							<div class="die__face die__face--3">
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--mm"></div>
								<div class="die__pip die__pip--tl"></div>
							</div>
							<div class="die__face die__face--4">
								<div class="die__pip die__pip--bl"></div>
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--tl"></div>
								<div class="die__pip die__pip--tr"></div>
							</div>
							<div class="die__face die__face--5">
								<div class="die__pip die__pip--bl"></div>
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--mm"></div>
								<div class="die__pip die__pip--tl"></div>
								<div class="die__pip die__pip--tr"></div>
							</div>
							<div class="die__face die__face--6">
								<div class="die__pip die__pip--bl"></div>
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--ml"></div>
								<div class="die__pip die__pip--mr"></div>
								<div class="die__pip die__pip--tl"></div>
								<div class="die__pip die__pip--tr"></div>
							</div>
							<div class="die__face die__face--0">
								<div class="die__pip die__pip--br"></div>
								<div class="die__pip die__pip--mm"></div>
								<div class="die__pip die__pip--tl"></div>
							</div>
						</div>
					</div>

					<div
						class="actions"
						x-bind:class="{ 'actions--visible': showReset || actionList.includes('dash') || showDone || actionList.includes('pass')}"
					>
						<button
							class="action-button action-button--reset-turn"
							x-on:click="handleReset"
							x-show="showReset"
						>
							Reset Turn
						</button>
						<button
							class="action-button action-button--dash"
							x-on:click="handleDash"
							x-show="actionList.includes('dash')"
						>
							Dash
						</button>
						<button
							class="action-button action-button--done"
							x-on:click="handleDone"
							x-show="showDone"
						>
							Done
						</button>
						<button
							class="action-button action-button--end-turn"
							x-on:click="handleEndTurn"
							x-show="actionList.includes('pass')"
						>
							End Turn
						</button>
					</div>
				</div>
			</div>
			<div
				class="container"
				style="overflow: auto"
			>
				<div
					class="container__inner game-board-container"
					x-ref="gameBoardContainer"
				>
					<div class="position:relative">
						<picture>
							<source
								type="image/webp"
								srcset="/static/images/v2/game-board.webp"
							/>
							<img
								class="game-board max-width:100%"
								src="/static/images/v2/game-board.jpg"
								alt=""
							/>
						</picture>
						<div class="spells">
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.charm1?.replace('.png', '.webp')"
								/>
								<img
									class="charm-spell charm-spell--1"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['charm1']),
										'spell--blue-lock': blueLock === spellDict['charm1'],
										'spell--red-lock': redLock === spellDict['charm1'],
										'spell--visible': spells.images.charm1,
									}"
									x-bind:src="spells.images.charm1"
									x-on:click="handleCharmClick('charm1')"
								/>
							</picture>
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.charm2?.replace('.png', '.webp')"
								/>
								<img
									class="charm-spell charm-spell--2"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.charm2"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['charm2']),
										'spell--blue-lock': blueLock === spellDict['charm2'],
										'spell--red-lock': redLock === spellDict['charm2'],
										'spell--visible': spells.images.charm2,
									}"
									x-on:click="handleCharmClick('charm2')"
								/>
							</picture>
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.charm3?.replace('.png', '.webp')"
								/>
								<img
									class="charm-spell charm-spell--3"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.charm3"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['charm3']),
										'spell--blue-lock': blueLock === spellDict['charm3'],
										'spell--red-lock': redLock === spellDict['charm3'],
										'spell--visible': spells.images.charm3,
									}"
									x-on:click="handleCharmClick('charm3')"
								/>
							</picture>

							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.ritual1?.replace('.png', '.webp')"
								/>
								<img
									class="ritual-spell ritual-spell--1"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.ritual1"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['ritual1']),
										'spell--blue-lock': blueLock === spellDict['ritual1'],
										'spell--red-lock': redLock === spellDict['ritual1'],
										'spell--visible': spells.images.ritual1,
									}"
									x-on:click="handleSpellClick('ritual1')"
								/>
							</picture>
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.ritual2?.replace('.png', '.webp')"
								/>
								<img
									class="ritual-spell ritual-spell--2"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.ritual2"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['ritual2']),
										'spell--blue-lock': blueLock === spellDict['ritual2'],
										'spell--red-lock': redLock === spellDict['ritual2'],
										'spell--visible': spells.images.ritual2,
									}"
									x-on:click="handleSpellClick('ritual2')"
								/>
							</picture>
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.ritual3?.replace('.png', '.webp')"
								/>
								<img
									class="ritual-spell ritual-spell--3"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.ritual3"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['ritual3']),
										'spell--blue-lock': blueLock === spellDict['ritual3'],
										'spell--red-lock': redLock === spellDict['ritual3'],
										'spell--visible': spells.images.ritual3,
									}"
									x-on:click="handleSpellClick('ritual3')"
								/>
							</picture>

							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.sorcery1?.replace('.png', '.webp')"
								/>
								<img
									class="sorcery-spell sorcery-spell--1"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.sorcery1"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['sorcery1']),
										'spell--blue-lock': blueLock === spellDict['sorcery1'],
										'spell--red-lock': redLock === spellDict['sorcery1'],
										'spell--visible': spells.images.sorcery1,
									}"
									x-on:click="handleSpellClick('sorcery1')"
								/>
							</picture>
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.sorcery2?.replace('.png', '.webp')"
								/>
								<img
									class="sorcery-spell sorcery-spell--2"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.sorcery2"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['sorcery2']),
										'spell--blue-lock': blueLock === spellDict['sorcery2'],
										'spell--red-lock': redLock === spellDict['sorcery2'],
										'spell--visible': spells.images.sorcery2,
									}"
									x-on:click="handleSpellClick('sorcery2')"
								/>
							</picture>
							<picture>
								<source
									type="image/webp"
									x-bind:srcset="spells.images.sorcery3?.replace('.png', '.webp')"
								/>
								<img
									class="sorcery-spell sorcery-spell--3"
									alt=""
									src="/static/images/v2/spacer.gif"
									x-bind:src="spells.images.sorcery3"
									x-bind:class="{
										'spell--available': actionList.includes(spellDict['sorcery3']),
										'spell--blue-lock': blueLock === spellDict['sorcery3'],
										'spell--red-lock': redLock === spellDict['sorcery3'],
										'spell--visible': spells.images.sorcery3,
									}"
									x-on:click="handleSpellClick('sorcery3')"
								/>
							</picture>
						</div>
						<div class="stone-nodes">
							<div
								class="stone-node stone-node--blue stone-node--score"
								x-bind:class="{ [`stone-node--score-${score}`]: true }"
							></div>
							<template x-for="node in Object.keys(nodes)">
								<button
									class="stone-node"
									x-bind:aria-label="node"
									x-bind:class="{
											[`stone-node--${node}`]: true,
											[`stone-node--${playerToRefill}`]: nodesToRefill[node] && playerToRefill,
											[`stone-node--${nodes[node]}`]: true,
											[`stone-node--valid-move-${validMoves[node]}`]: validMoves[node],
											'stone-node--last-play': lastPlay === node,
											'stone-node--refill': nodesToRefill[node],
										}"
									x-on:click="handleNodeClick(node)"
									x-bind:id="`stone-node--${node}`"
								></button>
							</template>
						</div>
					</div>
				</div>
			</div>

			<div
				class="win-modal"
				x-bind:class="{ 'is-visible': winner }"
			>
				<picture x-show="winner === 'blue'">
					<source
						type="image/webp"
						srcset="/static/images/v2/stones/blue.webp"
					/>
					<img
						alt=""
						src="/static/images/v2/stones/blue.png"
						height="30"
						width="30"
					/>
				</picture>
				<img
					alt="Blue Wins"
					src="/static/images/v2/blue-wins.svg"
					height="26"
					width="167"
					x-show="winner === 'blue'"
				/>
				<picture x-show="winner === 'red'">
					<source
						type="image/webp"
						srcset="/static/images/v2/stones/red.webp"
					/>
					<img
						alt=""
						src="/static/images/v2/stones/red.png"
						height="30"
						width="30"
					/>
				</picture>
				<img
					alt="Red Wins"
					src="/static/images/v2/red-wins.svg"
					height="26"
					width="167"
					x-show="winner === 'red'"
				/>
			</div>
		</div>
	</body>
</html>

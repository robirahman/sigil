<!DOCTYPE html>
<html>
	<head>
		<title>Sigil Online Private Match</title>

		<link
			rel="stylesheet"
			href="/static/privatematch.css"
		/>
		<link
			rel="icon"
			href="data:,"
		/>
	</head>

	<script src="/static/scripts/private-match.js"></script>

	<body onload="main();">
		<div id="privatematchdescription">
			<b>Play a private, unranked game against a friend.</b>
		</div>

		<div>
			<button
				id="creategamebutton"
				type="button"
			>
				<b>Create Game</b>
			</button>
		</div>

		<p
			class="buttontext"
			id="creategametext"
		>
			Create a new private game<br />that a friend can join.
		</p>

		<div>
			<button
				id="joingamebutton"
				type="button"
			>
				<b>Join Game</b>
			</button>
		</div>

		<p
			class="buttontext"
			id="joingametext"
		>
			Join a private game<br />that a friend has created.
		</p>

		<form id="creategameform">
			<label for="gamename">Game Name:</label><br />
			<input
				id="gamename"
				type="text"
				name="gamename"
				style="font-size: 15px"
			/><br />
			<label for="gamepwd">Game Password:</label><br />
			<input
				id="gamepwd"
				type="password"
				name="gamepwd"
				style="font-size: 15px"
			/><br />
			<input
				class="submitbutton"
				type="submit"
				value="Submit"
			/>
		</form>

		<form id="joingameform">
			<label for="gamename">Game Name:</label><br />
			<input
				id="gamename"
				type="text"
				name="gamename"
				style="font-size: 15px"
			/><br />
			<label for="gamepwd">Game Password:</label><br />
			<input
				id="gamepwd"
				type="password"
				name="gamepwd"
				style="font-size: 15px"
			/><br />
			<input
				class="submitbutton"
				type="submit"
				value="Submit"
			/>
		</form>
	</body>
</html>

{% extends "layout-form.html" %}

{% block title %}Login{% endblock %}

{% block content %}
{{ super() }}
<div class="column is-4 is-offset-4">
	<div>
		{% with messages = get_flashed_messages() %} {% if messages %}
		<div class="notification is-danger">{{ messages[0] }}</div>
		{% endif %} {% endwith %}
		<form
			method="POST"
			action="/login"
		>
			<div class="field">
				<div class="control">
					<input
						class="input is-large"
						type="email"
						name="email"
						placeholder="Your Email"
						autofocus=""
						required
					/>
				</div>
			</div>

			<div class="field">
				<div class="control">
					<input
						class="input is-large"
						type="password"
						name="password"
						placeholder="Your Password"
						required
					/>
				</div>
			</div>
			
			<div class="field">
				<label class="checkbox">
					<input
						type="checkbox"
						name="remember"
						checked
					/>
					Remember me
				</label>
			</div>

			<button class="button button-prime is-block is-large is-fullwidth">Login</button>
			
			<div class="cross-link">
				Don't have an account?&nbsp;<a href="/signup">Sign Up</a>
			</div>
		</form>
	</div>
</div>
{% endblock %}
